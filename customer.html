<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePaws - Pet Transport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
    .hidden { display: none; }
    .btn-primary { background-color: #10B981; color: white; transition: all 0.2s; }
    .btn-primary:hover { background-color: #059669; }
    .btn-danger { background-color: #EF4444; color: white; }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    #map { height: 250px; border-radius: 0.75rem; z-index: 1; }
  </style>
</head>
<body class="min-h-screen">

  <div id="loading-screen" class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
      <p class="mt-4 text-gray-600 font-semibold">Loading SafePaws...</p>
    </div>
  </div>

  <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-md p-8">
      <h1 class="text-3xl font-extrabold text-center text-gray-800">🐾 SafePaws</h1>
      <p class="text-center text-gray-500 mb-6">Your Pet's Safe Ride</p>
      <div id="auth-error" class="hidden bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm"></div>
      <div id="login-form">
        <input id="login-email" type="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-3">
        <input id="login-password" type="password" placeholder="Password" class="w-full p-3 border rounded-lg mb-4">
        <button id="login-btn" class="btn-primary w-full p-3 rounded-lg font-bold">Login</button>
        <p class="text-center text-sm mt-4">No account? <a href="#" id="show-signup" class="text-emerald-600 font-semibold">Sign up</a></p>
      </div>
      <div id="signup-form" class="hidden">
        <input id="signup-name" type="text" placeholder="Full Name" class="w-full p-3 border rounded-lg mb-3">
        <input id="signup-email" type="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-3">
        <input id="signup-password" type="password" placeholder="Password min 6 chars" class="w-full p-3 border rounded-lg mb-4">
        <button id="signup-btn" class="btn-primary w-full p-3 rounded-lg font-bold">Create Account</button>
        <p class="text-center text-sm mt-4">Have an account? <a href="#" id="show-login" class="text-emerald-600 font-semibold">Login</a></p>
      </div>
    </div>
  </div>

  <div id="dashboard-screen" class="hidden max-w-lg mx-auto p-4 pb-24">
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">Book a Ride 🐶</h1>
      <button id="logout-btn" class="text-sm text-red-500 font-semibold">Logout</button>
    </div>

    <div id="booking-form" class="card p-6 space-y-4">
      <h2 class="font-bold text-lg">Pet Details</h2>
      <input id="pet-name" type="text" placeholder="Pet Name e.g. Bantay" class="w-full p-3 border rounded-lg">
      <input id="pet-breed" type="text" placeholder="Breed e.g. Aspin" class="w-full p-3 border rounded-lg">
      <input id="pet-weight" type="number" placeholder="Weight in KG" class="w-full p-3 border rounded-lg">
      
      <h2 class="font-bold text-lg pt-2">Locations</h2>
      <div id="map"></div>
      <p class="text-xs text-gray-500">Tap the map to set Pick-up, then Drop-off.</p>
      <div class="grid grid-cols-2 gap-2 text-sm">
        <div class="p-2 bg-gray-100 rounded-lg">Pick-up: <span id="pickup-coords">Not set</span></div>
        <div class="p-2 bg-gray-100 rounded-lg">Drop-off: <span id="dropoff-coords">Not set</span></div>
      </div>
      
      <button id="book-now-btn" class="btn-primary w-full p-3 rounded-lg font-bold mt-2">Find a Driver</button>
    </div>

    <div id="tracking-screen" class="hidden card p-6 text-center">
      <h2 class="font-bold text-lg mb-2">Driver on the way! 🚗</h2>
      <p>Status: <span id="booking-status" class="font-bold text-emerald-600">Searching...</span></p>
      <div id="driver-info" class="hidden mt-4 p-3 bg-gray-100 rounded-lg text-left">
        <p><b>Driver:</b> <span id="driver-name"></span></p>
        <p><b>Plate:</b> <span id="driver-plate"></span></p>
      </div>
      <button id="cancel-booking-btn" class="btn-danger w-full p-3 rounded-lg font-bold mt-4">Cancel Booking</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
  // EXACT COPY MULA SA PICTURE MO BOI
  const firebaseConfig = {
    apiKey: "AIzaSyB-SCC1fUr-1ONynDYXeoCQGnY2PCQmY1g",
    authDomain: "safepaws-batangas.firebaseapp.com", 
    projectId: "safepaws-batangas", 
    storageBucket: "safepaws-batangas.firebasestorage.app", 
    messagingSenderId: "629904615191",
    appId: "1:629904615191:web:45f7148d65ba61a867f952"
  };
  const API_URL = "https://safepaws-backend.onrender.com";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  let currentUser = null;
  let map, pickupMarker, dropoffMarker;
  let pickupCoords = null;
  let dropoffCoords = null;
  let currentBookingId = null;
  let statusInterval = null;

  const screens = {
    loading: document.getElementById('loading-screen'),
    auth: document.getElementById('auth-screen'),
    dashboard: document.getElementById('dashboard-screen'),
  };
  const authError = document.getElementById('auth-error');
  const showError = (msg) => { authError.textContent = msg; authError.classList.remove('hidden'); }
  const hideError = () => authError.classList.add('hidden');

  function showScreen(name) {
    Object.values(screens).forEach(s => s.classList.add('hidden'));
    screens[name].classList.remove('hidden');
  }

  function initMap() {
    if (map) return;
    map = L.map('map').setView([13.7565, 121.0583], 12); // Batangas default
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    map.on('click', function(e) {
      if (!pickupCoords) {
        pickupCoords = e.latlng;
        if (pickupMarker) map.removeLayer(pickupMarker);
        pickupMarker = L.marker(pickupCoords, {icon: L.icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41]})}).addTo(map).bindPopup("Pick-up").openPopup();
        document.getElementById('pickup-coords').textContent = `${pickupCoords.lat.toFixed(4)}, ${pickupCoords.lng.toFixed(4)}`;
      } else if (!dropoffCoords) {
        dropoffCoords = e.latlng;
        if (dropoffMarker) map.removeLayer(dropoffMarker);
        dropoffMarker = L.marker(dropoffCoords, {icon: L.icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41]})}).addTo(map).bindPopup("Drop-off").openPopup();
        document.getElementById('dropoff-coords').textContent = `${dropoffCoords.lat.toFixed(4)}, ${dropoffCoords.lng.toFixed(4)}`;
      }
    });
  }

  onAuthStateChanged(auth, user => {
    screens.loading.classList.add('hidden');
    if (user) {
      currentUser = user;
      showScreen('dashboard');
      setTimeout(initMap, 100);
    } else {
      currentUser = null;
      showScreen('auth');
      document.getElementById('login-form').classList.remove('hidden');
      document.getElementById('signup-form').classList.add('hidden');
      if(statusInterval) clearInterval(statusInterval);
    }
  });

  document.getElementById('show-signup').onclick = (e) => { e.preventDefault(); hideError(); document.getElementById('login-form').classList.add('hidden'); document.getElementById('signup-form').classList.remove('hidden'); }
  document.getElementById('show-login').onclick = (e) => { e.preventDefault(); hideError(); document.getElementById('signup-form').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }
  document.getElementById('logout-btn').onclick = () => signOut(auth);

  document.getElementById('signup-btn').onclick = async () => {
    hideError();
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(userCredential.user, { displayName: name });
      await fetch(`${API_URL}/api/customers/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uid: userCredential.user.uid, name, email }) });
    } catch (error) { showError(error.message); }
  };
  document.getElementById('login-btn').onclick = async () => {
    hideError();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    try { await signInWithEmailAndPassword(auth, email, password); } catch (error) { showError("Invalid email or password."); }
  };

  document.getElementById('book-now-btn').onclick = async () => {
    const petName = document.getElementById('pet-name').value;
    if (!petName || !pickupCoords || !dropoffCoords) {
      return alert("Please fill pet name and tap map to set Pick-up and Drop-off.");
    }
    const token = await currentUser.getIdToken();
    const res = await fetch(`${API_URL}/api/bookings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({
        pet: { name: petName, breed: document.getElementById('pet-breed').value, weight: document.getElementById('pet-weight').value },
        pickup: { lat: pickupCoords.lat, lng: pickupCoords.lng },
        dropoff: { lat: dropoffCoords.lat, lng: dropoffCoords.lng }
      })
    });
    const data = await res.json();
    if (res.ok) {
      currentBookingId = data.bookingId;
      document.getElementById('booking-form').classList.add('hidden');
      document.getElementById('tracking-screen').classList.remove('hidden');
      startTracking();
    } else { alert(data.error || "Booking failed."); }
  };

  function startTracking() {
    statusInterval = setInterval(async () => {
      const token = await currentUser.getIdToken();
      const res = await fetch(`${API_URL}/api/bookings/${currentBookingId}`, { headers: { 'Authorization': `Bearer ${token}` } });
      const booking = await res.json();
      document.getElementById('booking-status').textContent = booking.status;
      if (booking.driver) {
        document.getElementById('driver-info').classList.remove('hidden');
        document.getElementById('driver-name').textContent = booking.driver.name;
        document.getElementById('driver-plate').textContent = booking.driver.plate;
      }
      if (booking.status === 'completed' || booking.status === 'cancelled') {
        clearInterval(statusInterval);
        alert(`Booking ${booking.status}`);
        resetApp();
      }
    }, 3000);
  }

  document.getElementById('cancel-booking-btn').onclick = async () => {
    const token = await currentUser.getIdToken();
    await fetch(`${API_URL}/api/bookings/${currentBookingId}/cancel`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
    clearInterval(statusInterval);
    resetApp();
  };

  function resetApp() {
    document.getElementById('tracking-screen').classList.add('hidden');
    document.getElementById('booking-form').classList.remove('hidden');
    document.getElementById('pet-name').value = '';
    pickupCoords = null; dropoffCoords = null; currentBookingId = null;
    document.getElementById('pickup-coords').textContent = 'Not set';
    document.getElementById('dropoff-coords').textContent = 'Not set';
    if(pickupMarker) map.removeLayer(pickupMarker);
    if(dropoffMarker) map.removeLayer(dropoffMarker);
  }
</script>
</body>
</html>
