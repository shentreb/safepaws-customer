<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePaws - Pet Transport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
    .hidden { display: none; }
    .btn-primary { background-color: #10B981; color: white; transition: all 0.2s; }
    .btn-primary:hover { background-color: #059669; transform: translateY(-1px); }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="min-h-screen">

  <!-- LOADING SCREEN -->
  <div id="loading-screen" class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
      <p class="mt-4 text-gray-600 font-semibold">Loading SafePaws...</p>
    </div>
  </div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="hidden min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-md p-8">
      <h1 class="text-3xl font-extrabold text-center text-gray-800">🐾 SafePaws</h1>
      <p class="text-center text-gray-500 mb-6">Your Pet's Safe Ride</p>
      
      <div id="auth-error" class="hidden bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm"></div>

      <div id="login-form">
        <input id="login-email" type="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-3">
        <input id="login-password" type="password" placeholder="Password" class="w-full p-3 border rounded-lg mb-4">
        <button id="login-btn" class="btn-primary w-full p-3 rounded-lg font-bold">Login</button>
        <p class="text-center text-sm mt-4">No account? <a href="#" id="show-signup" class="text-emerald-600 font-semibold">Sign up</a></p>
      </div>

      <div id="signup-form" class="hidden">
        <input id="signup-name" type="text" placeholder="Full Name" class="w-full p-3 border rounded-lg mb-3">
        <input id="signup-email" type="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-3">
        <input id="signup-password" type="password" placeholder="Password min 6 chars" class="w-full p-3 border rounded-lg mb-4">
        <button id="signup-btn" class="btn-primary w-full p-3 rounded-lg font-bold">Create Account</button>
        <p class="text-center text-sm mt-4">Have an account? <a href="#" id="show-login" class="text-emerald-600 font-semibold">Login</a></p>
      </div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen" class="hidden max-w-lg mx-auto p-4">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">Hello, <span id="user-name">User</span> 👋</h1>
      <button id="logout-btn" class="text-sm text-red-500 font-semibold">Logout</button>
    </div>
    <div class="card p-6 text-center">
      <p class="text-gray-600">✅ SUCCESS! You are logged in.</p>
      <p class="text-sm text-gray-400 mt-2">Next: Booking Form + Map</p>
    </div>
  </div>


<script type="module">
  // 1. IMPORT FIREBASE - AYOS NA TO BOI
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
  // 2. TAMANG CONFIG - ITO NA YUNG SAYO BOI
  const firebaseConfig = {
    apiKey: "AIzaSyB-SCC1fUr-1ONynDYXeoCQGnY2PCQmY1g",
    authDomain: "safepaws-11ba2.firebaseapp.com",
    projectId: "safepaws-11ba2",
    storageBucket: "safepaws-11ba2.appspot.com",
    messagingSenderId: "629904615191",
    appId: "1:629904615191:web:45f7148d65ba61a867f952"
  };

  // 3. INIT FIREBASE
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 4. TAMANG BACKEND URL - ITO NA YUNG SAYO BOI
  const API_URL = "https://safepaws-backend.onrender.com";

  // 5. UI ELEMENTS
  const loadingScreen = document.getElementById('loading-screen');
  const authScreen = document.getElementById('auth-screen');
  const appScreen = document.getElementById('app-screen');
  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  const authError = document.getElementById('auth-error');

  const showError = (msg) => {
    authError.textContent = msg;
    authError.classList.remove('hidden');
  }
  const hideError = () => authError.classList.add('hidden');

  // 6. AUTH STATE LISTENER
  onAuthStateChanged(auth, user => {
    loadingScreen.classList.add('hidden');
    if (user) {
      document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];
      authScreen.classList.add('hidden');
      appScreen.classList.remove('hidden');
    } else {
      appScreen.classList.add('hidden');
      authScreen.classList.remove('hidden');
      loginForm.classList.remove('hidden');
      signupForm.classList.add('hidden');
    }
  });

  // 7. AUTH LOGIC
  document.getElementById('show-signup').onclick = (e) => { e.preventDefault(); hideError(); loginForm.classList.add('hidden'); signupForm.classList.remove('hidden'); }
  document.getElementById('show-login').onclick = (e) => { e.preventDefault(); hideError(); signupForm.classList.add('hidden'); loginForm.classList.remove('hidden'); }

  document.getElementById('signup-btn').onclick = async () => {
    hideError();
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(userCredential.user, { displayName: name });
      // Save to backend
      await fetch(`${API_URL}/api/customers/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid: userCredential.user.uid, name, email })
      });
    } catch (error) { showError(error.message); }
  };

  document.getElementById('login-btn').onclick = async () => {
    hideError();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) { showError("Invalid email or password."); }
  };

  document.getElementById('logout-btn').onclick = () => signOut(auth);

</script>
</body>
</html>
