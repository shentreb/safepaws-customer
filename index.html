<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SafePaws 🐾</title>

  <!-- PWA FILES -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10B981">

  <!-- MAPBOX + TAILWIND -->
  <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
  <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
    @keyframes bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
   .animate-bounce-slow { animation: bounce 2s infinite; }
    #sheet { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; transition: height 0.2s ease-out; touch-action: none; }
   .sheet-collapsed { height: 12%!important; }
    #authModal { z-index: 20; backdrop-filter: blur(4px); }
  </style>
</head>
<body class="bg-gray-100">

  <!-- AUTH MODAL - FIREBASE -->
  <div id="authModal" class="fixed inset-0 bg-black/60 flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl w-11/12 max-w-sm shadow-xl">
      <h2 class="text-2xl font-bold text-[#10B981] mb-4 text-center animate-bounce-slow">SafePaws 🐾</h2>
      <input id="email" type="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-2">
      <input id="password" type="password" placeholder="Password" class="w-full p-3 border rounded-lg mb-4">
      <button id="loginBtn" class="w-full bg-[#10B981] text-white font-bold p-3 rounded-lg mb-2">Login</button>
      <button id="signupBtn" class="w-full bg-gray-200 text-gray-800 font-bold p-3 rounded-lg mb-2">Sign Up</button>
      <button id="forgotBtn" class="w-full text-sm text-[#10B981]">Forgot Password?</button>
      <p id="authError" class="text-red-500 text-sm mt-2 text-center"></p>
    </div>
  </div>

  <!-- MAP -->
  <div id='map'></div>

  <!-- DRAGGABLE BOTTOM SHEET -->
  <div id="sheet" class="bg-white rounded-t-3xl shadow-2xl sheet-collapsed hidden">
    <div id="handle" class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mt-3 cursor-grab active:cursor-grabbing"></div>
    <div class="p-5 overflow-y-auto h-full">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-bold text-[#10B981]">SafePaws 🐾</h1>
        <button id="logoutBtn" class="text-sm text-red-500 font-semibold">Logout</button>
      </div>

      <label class="font-semibold">Booking Type</label>
      <select id="bookingType" class="w-full p-3 border rounded-lg mb-3 bg-white">
        <option>Transpo</option><option>Vet</option><option>Groom</option><option>Emergency</option>
      </select>

      <label class="font-semibold">Select Pet</label>
      <select id="petSelect" class="w-full p-3 border rounded-lg mb-3 bg-white">
        <option data-size="Medium" data-weight="12">Bella - Beagle, 12kg</option>
        <option data-size="Large" data-weight="28">Bruno - Husky, 28kg</option>
      </select>

      <label id="clinicLabel" class="font-semibold hidden">Nearest Vet/Groom</label>
      <select id="clinicSelect" class="w-full p-3 border rounded-lg mb-3 bg-white hidden">
        <option>Locating you...</option>
      </select>

      <div class="bg-green-50 p-3 rounded-lg mb-4">
        <p class="text-sm text-gray-600">Estimated Fare</p>
        <p id="fare" class="text-3xl font-bold text-[#10B981]">₱350</p>
      </div>
      <button id="bookBtn" class="w-full bg-[#10B981] text-white font-bold p-4 rounded-lg">Book SafePaws Ride</button>
    </div>
  </div>

  <script type="module">
    import { CONFIG } from './config.js';

    // 1. FIREBASE SDK
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 2. PALITAN MO ITO NG IYO MULA SA FIREBASE CONSOLE
    const firebaseConfig = {
      apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
      authDomain: "safepaws-batangas.firebaseapp.com",
      projectId: "safepaws-batangas",
      storageBucket: "safepaws-batangas.firebasestorage.app",
      messagingSenderId: "629904615191",
      appId: "1:629904615191:web:45f7148d65ba61a867f952"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 3. PALITAN MO ITO NG MAPBOX TOKEN MO
    mapboxgl.accessToken = 'pk.eyJ1IjoiZGVtbyIsImEiOiJjbGZhcGkifQ';
    const map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/streets-v12', center: [121.08, 13.79], zoom: 13 });
    let userLocation = [121.08, 13.79];

    // 4. AUTH LOGIC
    const authModal = document.getElementById('authModal');
    const sheet = document.getElementById('sheet');
    const authError = document.getElementById('authError');

    onAuthStateChanged(auth, user => {
      if (user) { authModal.classList.add('hidden'); sheet.classList.remove('hidden'); initApp(); }
      else { authModal.classList.remove('hidden'); sheet.classList.add('hidden'); }
    });
    document.getElementById('signupBtn').onclick = () => authCall(createUserWithEmailAndPassword);
    document.getElementById('loginBtn').onclick = () => authCall(signInWithEmailAndPassword);
    document.getElementById('forgotBtn').onclick = () => sendPasswordResetEmail(auth, document.getElementById('email').value).then(() => alert('Reset link sent')).catch(err => authError.textContent = err.message);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);
    function authCall(fn) {
      authError.textContent = '';
      fn(auth, document.getElementById('email').value, document.getElementById('password').value).catch(err => authError.textContent = err.message);
    }

    // 5. MAIN APP LOGIC
    function initApp() {
      // GPS + NEARBY CLINICS
      navigator.geolocation.getCurrentPosition(pos => {
        userLocation = [pos.coords.longitude, pos.coords.latitude];
        map.setCenter(userLocation);
        new mapboxgl.Marker({ color: '#10B981' }).setLngLat(userLocation).addTo(map);
        fetchNearbyClinics();
      }, () => fetchNearbyClinics());

      async function fetchNearbyClinics() {
        const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/veterinary_clinic,pet_grooming_service.json?proximity=${userLocation[0]},${userLocation[1]}&limit=10&access_token=${mapboxgl.accessToken}`;
        try {
          const res = await fetch(url);
          const data = await res.json();
          const clinicSelect = document.getElementById('clinicSelect');
          clinicSelect.innerHTML = data.features.length? '' : '<option>No Vet/Groom found nearby</option>';
          data.features.forEach(p => {
            const km = ((p.properties.distance || 0) / 1000).toFixed(1);
            clinicSelect.innerHTML += `<option value="${p.text}|${p.place_name}">${p.text} - ${km}km</option>`;
          });
        } catch { document.getElementById('clinicSelect').innerHTML = '<option>Error loading</option>'; }
      }

      // DRAGGABLE SHEET
      let startY = 0; let startHeight = 0;
      const handle = document.getElementById('handle');
      handle.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startHeight = sheet.offsetHeight; sheet.style.transition = 'none'; });
      handle.addEventListener('touchmove', e => { let h = Math.max(window.innerHeight * 0.12, Math.min(startHeight + (startY - e.touches[0].clientY), window.innerHeight * 0.9)); sheet.style.height = `${h}px`; });
      handle.addEventListener('touchend', () => { sheet.style.transition = 'height 0.2s ease-out'; sheet.offsetHeight < window.innerHeight * 0.4? sheet.classList.add('sheet-collapsed') : (sheet.classList.remove('sheet-collapsed'), sheet.style.height = '90%'); });

      // FARE + BOOKING
      const bookingType = document.getElementById('bookingType');
      const clinicLabel = document.getElementById('clinicLabel');
      const clinicSelect = document.getElementById('clinicSelect');
      const petSelect = document.getElementById('petSelect');
      const fareEl = document.getElementById('fare');

      bookingType.addEventListener('change', () => {
        const show = ['Vet','Groom'].includes(bookingType.value);
        clinicLabel.classList.toggle('hidden',!show); clinicSelect.classList.toggle('hidden',!show);
        if(show) fetchNearbyClinics(); calculateFare();
      });
      function calculateFare() {
        const s = petSelect.options[petSelect.selectedIndex].dataset.size;
        let f = CONFIG.FARE.BASE + CONFIG.FARE.SIZE_FEE[s] + (10 * CONFIG.FARE.PER_KM);
        if (bookingType.value === 'Emergency') f += CONFIG.FARE.EMERGENCY_FEE;
        if (s === 'Large') f += CONFIG.FARE.SUV_FEE;
        fareEl.textContent = `₱${Math.max(f, CONFIG.FARE.MIN_FARE)}`;
      }
      petSelect.addEventListener('change', calculateFare); calculateFare();

      document.getElementById('bookBtn').onclick = () => {
        const w = parseInt(petSelect.options[petSelect.selectedIndex].dataset.weight);
        if (w > CONFIG.MAX_KG_PER_PET) return alert(`Max ${CONFIG.MAX_KG_PER_PET}kg lang per pet.`);
        alert(`Booked: ${bookingType.value} | ${fareEl.textContent} | Clinic: ${clinicSelect.value.split('|')[0]}`);
      };
    }
  </script>
</body>
</html>
