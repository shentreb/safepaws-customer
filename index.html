<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SafePaws Customer V1.2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:#e5e7eb}

/* SPLASH ANIMATION */
#splash{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e293b);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;animation:fadeOut 0.5s ease 1.5s forwards}
#splash div{font-size:80px;animation:bounce 1s infinite}
#splash h1{margin:10px 0 0;font-size:32px;color:#38bdf8}
#splash small{color:#94a3b8}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

#loginScreen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b)}
.login-card{background:#1e293b;padding:28px;border-radius:16px;width:90%;max-width:380px;border:1px solid #334155}
.login-card h1{text-align:center;margin:0 0 16px}
.login-card input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#e5e7eb}
.login-card button{width:100%;padding:14px;margin-top:10px;border:0;border-radius:12px;background:#38bdf8;color:#0f172a;font-weight:bold;cursor:pointer}
.login-card button:disabled{opacity:0.6;cursor:not-allowed}
#appScreen{display:none}
header{padding:14px 16px;background:#1e293b;border-bottom:1px solid #334155;text-align:center;font-weight:bold}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:16px;margin:12px}
.card input{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e5e7eb}
#map{height:300px;border-radius:12px;margin-top:12px}
.rider-card{display:flex;align-items:center;gap:12px}
.avatar{width:50px;height:50px;border-radius:50%;background:#38bdf8;display:flex;align-items:center;justify-content:center;font-size:24px}
.status-badge{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:bold;display:inline-block;margin-top:8px}
.status-wait{background:#f59e0b;color:#0f172a}
.status-pickup{background:#38bdf8;color:#0f172a}
.status-otw{background:#a855f7;color:#fff}
.status-done{background:#16a34a;color:#fff}
.timeline{margin-top:12px}
.timeline-item{display:flex;gap:10px;margin:8px 0;color:#94a3b8}
.timeline-item.active{color:#38bdf8;font-weight:bold}
.price-row{display:flex;justify-content:space-between;margin:4px 0}
small{color:#94a3b8}
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div>🐾</div>
  <h1>SafePaws</h1>
  <small>Pet Transport</small>
</div>

<div id="loginScreen" style="display:none">
  <div class="login-card">
    <h1>🐾 SafePaws</h1>
    <input id="email" type="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="appScreen">
<header id="headerTitle">Book a Ride</header>

<!-- BOOKING SCREEN -->
<div id="bookScreen">
  <div class="card">
    <h3>📍 Pet Transport</h3>
    <input id="petName" placeholder="Pet Name e.g. Bantay">
    <input id="petBreed" placeholder="Breed e.g. Aspin">
    <input id="pickup" placeholder="Pick-up Location e.g. Bauan Plaza">
    <input id="dropoff" placeholder="Drop-off Vet/Groom e.g. Talisay Vet">
    <small>Fare = ₱80 + ₱15/KM. Min ₱250</small>
    <button id="bookBtn" onclick="bookRide()">Book Now</button>
  </div>
</div>

<!-- TRACKING SCREEN -->
<div id="trackScreen" style="display:none">
  <div class="card rider-card">
    <div class="avatar">🏍️</div>
    <div>
      <b id="riderName">Finding rider...</b><br>
      <small id="riderPlate"></small><br>
      <small id="riderPhone"></small>
    </div>
  </div>
  
  <div class="card">
    <div class="price-row"><span>Distance:</span> <b id="kmText">0KM</b></div>
    <div class="price-row"><span>Fare:</span> <b id="fareText">₱0</b></div>
    <hr style="border:0;border-top:1px solid #334155;margin:8px 0">
    <b>Status: </b><span id="statusBadge" class="status-badge status-wait">Waiting for Rider</span>
    <div class="timeline">
      <div id="t1" class="timeline-item active">● Rider Assigned</div>
      <div id="t2" class="timeline-item">● Picked Up Pet</div>
      <div id="t3" class="timeline-item">● On The Way</div>
      <div id="t4" class="timeline-item">● Dropped Off ✓</div>
    </div>
  </div>

  <div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 LAGAY MO DITO YUNG FIREBASE CONFIG MO 🔥 */
const firebaseConfig = {
  apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os",
  authDomain: "safepaws-batangas.firebaseapp.com",
  projectId: "safepaws-batangas",
  storageBucket: "safepaws-batangas.firebasestorage.app",
  messagingSenderId: "629904615191",
  appId: "1:629904615191:web:45f7148d65ba61a867f952"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let uid, bookingId, map, riderMarker;

onAuthStateChanged(auth, user=>{
  if(user){
    uid=user.uid;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').style.display='block';
    checkActiveBooking();
  }else{
    document.getElementById('loginScreen').style.display='flex';
  }
});

async function login(){
  try{await signInWithEmailAndPassword(auth,document.getElementById('email').value,document.getElementById('pass').value);}
  catch(e){alert(e.message);}
}
window.login=login;

async function bookRide(){
  const btn = document.getElementById('bookBtn');
  btn.disabled = true;
  btn.textContent = 'Booking...';

  const pickupText = document.getElementById('pickup').value;
  const dropoffText = document.getElementById('dropoff').value;
  if(!pickupText || !dropoffText){alert('Fill all fields');btn.disabled=false;btn.textContent='Book Now';return;}

  const p1 = await geocode(pickupText);
  const p2 = await geocode(dropoffText);
  if(!p1 || !p2){alert('Invalid location. Try: Bauan, Batangas');btn.disabled=false;btn.textContent='Book Now';return;}

  const km = haversine(p1.lat, p1.lng, p2.lat, p2.lng);
  const baseFare = 80;
  const perKm = 15;
  const fare = Math.max(250, Math.round(baseFare + (km * perKm)));

  const data = {
    customerId: uid,
    petName: document.getElementById('petName').value,
    petBreed: document.getElementById('petBreed').value,
    pickup: pickupText, pickupLat: p1.lat, pickupLng: p1.lng,
    dropoff: dropoffText, dropoffLat: p2.lat, dropoffLng: p2.lng,
    distanceKm: km.toFixed(1),
    fare: fare,
    status: 'pending',
    riderId: null,
    createdAt: serverTimestamp()
  };
  const ref = await addDoc(collection(db,'bookings'), data);
  bookingId = ref.id;
  alert(`Booking created! \nDistance: ${km.toFixed(1)}KM \nFare: ₱${fare}`);
  showTrackScreen();
  btn.disabled=false;
  btn.textContent='Book Now';
}
window.bookRide=bookRide;

function checkActiveBooking(){
  onSnapshot(collection(db,'bookings'), snap=>{
    const myBooking = snap.docs.find(d=>d.data().customerId===uid && d.data().status!=='completed');
    if(myBooking){
      bookingId = myBooking.id;
      listenBooking(myBooking.id);
      showTrackScreen();
    }
  });
}

function listenBooking(id){
  onSnapshot(doc(db,'bookings',id), snap=>{
    const b = snap.data();
    if(!b) return;

    document.getElementById('kmText').textContent = b.distanceKm + 'KM';
    document.getElementById('fareText').textContent = '₱' + b.fare;

    if(b.riderId){
      onSnapshot(doc(db,'riders',b.riderId), rSnap=>{
        const r = rSnap.data();
        if(r){
          document.getElementById('riderName').textContent = r.name;
          document.getElementById('riderPlate').textContent = r.plate;
          document.getElementById('riderPhone').textContent = r.phone;
          if(r.lat && r.lng){
            if(!map) initMap(r.lat,r.lng);
            riderMarker.setLatLng([r.lat,r.lng]);
          }
        }
      });
    }

    const status = b.status;
    const badge = document.getElementById('statusBadge');
    document.querySelectorAll('.timeline-item').forEach(i=>i.classList.remove('active'));
    
    if(status==='pending'){badge.textContent='Waiting for Admin/Rider';badge.className='status-badge status-wait';document.getElementById('t1').classList.add('active');}
    if(status==='assigned'){badge.textContent='Rider On The Way';badge.className='status-badge status-wait';document.getElementById('t1').classList.add('active');}
    if(status==='pickedup'){badge.textContent='Pet Picked Up';badge.className='status-badge status-pickup';document.getElementById('t1').classList.add('active');document.getElementById('t2').classList.add('active'); alert('🐾 Pet has been picked up by '+b.riderName);}
    if(status==='otw'){badge.textContent='On The Way to Vet';badge.className='status-badge status-otw';document.getElementById('t1').classList.add('active');document.getElementById('t2').classList.add('active');document.getElementById('t3').classList.add('active');}
    if(status==='completed'){badge.textContent='Dropped Off ✓';badge.className='status-badge status-done';document.querySelectorAll('.timeline-item').forEach(i=>i.classList.add('active')); alert('✅ Pet safely dropped off!');}
  });
}

function initMap(lat,lng){
  map=L.map('map').setView([lat,lng],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  riderMarker=L.marker([lat,lng]).addTo(map).bindPopup('Your Rider');
}

function showTrackScreen(){
  document.getElementById('bookScreen').style.display='none';
  document.getElementById('trackScreen').style.display='block';
  document.getElementById('headerTitle').textContent='Tracking Your Pet';
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

async function geocode(q){
  try{
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`);
    const data = await res.json();
    if(data.length>0) return {lat:parseFloat(data[0].lat), lng:parseFloat(data[0].lon)};
  }catch(e){console.log(e)}
  return null;
}
</script>
</body>
</html>
