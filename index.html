<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SafePaws Customer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  body{font-family:system-ui;background:#f8fafc;margin:0;padding:20px}
  .card{background:#fff;padding:16px;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.06);margin-bottom:16px}
  input,select,textarea,button{width:100%;padding:10px;margin-top:6px;border:1px solid #ddd;border-radius:10px;font-size:14px}
  button{background:#2563eb;color:#fff;border:0;cursor:pointer;font-weight:600}
  button.secondary{background:#e5e7eb;color:#111}
  button.danger{background:#ef4444}
  label{font-size:12px;font-weight:600;color:#374151;margin-top:10px;display:block}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  #map{height:250px;border-radius:12px;margin-top:8px;z-index:1}
  .pet-card{border:1px dashed #ccc;padding:12px;border-radius:12px;margin-top:12px;position:relative;background:#fafafa}
  .remove-pet{position:absolute;top:8px;right:8px;width:auto;padding:4px 8px;font-size:12px;background:#ef4444}
  h3{margin:16px 0 8px 0}
  .toggle{display:flex;align-items:center;gap:10px;margin-top:10px}
  .toggle input{width:auto}
  .note{font-size:12px;color:#666;margin-top:4px}
</style>
</head>
<body>

<!-- 1. AUTH BOX -->
<div id="authBox" class="card">
  <h2>SafePaws Login 🐾</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <div class="row">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn" class="secondary">Login</button>
  </div>
</div>

<!-- 2. DASHBOARD / BOOKING FORM -->
<div id="dashBox" class="card" style="display:none">
  <h2>Book a Ride 🐾</h2>
  <p>Logged in as: <b id="userEmail"></b> <button id="logoutBtn" class="secondary" style="width:auto;float:right;padding:6px 10px">Logout</button></p>

  <form id="bookingForm">
    <h3>1. Pets</h3>
    <div id="petsContainer"></div>
    <button type="button" id="addPetBtn" class="secondary">+ Add Another Pet</button>

    <h3>2. Service Details</h3>
    <label>Clinic Location</label>
    <select id="clinic" required>
      <option value="">Select Clinic</option>
      <option>Pet Wellness Center - Batangas City</option>
      <option>VetCare Lipa</option>
      <option>Tanauan Animal Clinic</option>
      <option>St. Francis Vet - Bauan</option>
      <option>Other / Home Service</option>
    </select>

    <label>Service Type</label>
    <select id="serviceType">
      <option>Pet Taxi</option>
      <option>Vet Appointment</option>
      <option>Grooming</option>
      <option>Emergency</option>
    </select>

    <div class="toggle">
      <input type="checkbox" id="returnTrip">
      <label for="returnTrip">Return Trip? Hatid + Sundo = x2 Fare</label>
    </div>
    
    <label>Service Mode</label>
    <select id="serviceMode">
      <option value="premium">Premium - ₱150/hr, Rider waits only for you</option>
      <option value="budget">Budget - ₱50/hr, Rider can take other bookings</option>
    </select>
    <div class="note">*Budget mode = mas mura pero baka ma-delay sundo</div>

    <label>Estimated Waiting Time</label>
    <select id="waitTime">
      <option value="0">No Waiting - Drop only</option>
      <option value="1">1 Hour</option>
      <option value="2">2 Hours</option>
      <option value="3">3 Hours</option>
    </select>

    <label>Notes for Driver</label>
    <textarea id="notes" placeholder="e.g. Nervous pet, bring leash, gate code"></textarea>

    <h3>3. Payment</h3>
    <label>Payment Method</label>
    <select id="paymentMethod" required>
      <option value="">Select Payment</option>
      <option>Cash on Delivery</option>
      <option>GCash</option>
      <option>PayMaya</option>
    </select>

    <label>Estimated Fare for Rider Only ₱</label>
    <input id="fare" type="number" placeholder="Auto compute" step="0.01" readonly>
    <small class="note">*Vet/Grooming fee is separate. Will be notified after service.</small>

    <h3>4. Pick-up Location</h3>
    <div id="map"></div>
    <button type="button" id="clearLocationBtn" class="danger">Clear Location 📍</button>
    <input id="lat" type="hidden"><input id="lng" type="hidden">
    
    <button type="button" id="bookBtn" style="margin-top:16px">Book Now</button>
  </form>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  // 1. FIREBASE SETUP
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBVaqhNCrgDlWGEVjXygszJUdQR_bpG7os", // <--- PALITAN MO TO BOI
    authDomain: "safepaws-batangas.firebaseapp.com",
    projectId: "safepaws-batangas",
    storageBucket: "safepaws-batangas.firebasestorage.app",
    messagingSenderId: "629904615191",
    appId: "1:629904615191:web:45f7148d65ba61a867f952"
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 2. GLOBALS
  const $ = id => document.getElementById(id);
  let marker = null;
  let map = null;

  // 3. FARE COMPUTE LOGIC
  function computeFare() {
    const baseFare = 150; // Sample base fare. Si admin mag-final nito
    const mode = $('serviceMode').value;
    const hours = parseInt($('waitTime').value);
    const rate = mode === 'premium' ? 150 : 50;
    let total = baseFare;
    if($('returnTrip').checked) total = total * 2;
    total += hours * rate;
    $('fare').value = total;
  }

  // 4. MAP INIT - FIX SA BLANK MAP
  function initMap() {
    if(map) return; 
    map = L.map('map').setView([13.7565, 121.0583], 12); // Batangas Center
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OSM'}).addTo(map);
    map.on('click', e => {
      if (marker) map.removeLayer(marker);
      marker = L.marker(e.latlng).addTo(map);
      $('lat').value = e.latlng.lat;
      $('lng').value = e.latlng.lng;
    });
    setTimeout(() => map.invalidateSize(), 200); // Magic para mawala gray
  }

  // 5. AUTH STATE
  onAuthStateChanged(auth, user => {
    $('authBox').style.display = user ? 'none' : 'block';
    $('dashBox').style.display = user ? 'block' : 'none';
    if(user) {
      $('userEmail').textContent = user.email;
      initMap();
      computeFare();
    }
  });

  // 6. AUTH BUTTONS
  $('signupBtn').onclick = async () => {
    try { await createUserWithEmailAndPassword(auth, $('email').value, $('password').value); }
    catch(e) { alert(e.message); }
  };
  $('loginBtn').onclick = async () => {
    try { await signInWithEmailAndPassword(auth, $('email').value, $('password').value); }
    catch(e) { alert(e.message); }
  };
  $('logoutBtn').onclick = () => signOut(auth);

  // 7. PET LOGIC
  window.calcAge = (input) => {
    const birthdate = new Date(input.value);
    const today = new Date();
    let age = today.getFullYear() - birthdate.getFullYear();
    const m = today.getMonth() - birthdate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthdate.getDate())) age--;
    input.closest('.pet-card').querySelector('.petAge').value = age >= 0 ? age : '';
  }

  $('addPetBtn').onclick = () => {
    const petHTML = `
      <div class="pet-card">
        <button type="button" class="remove-pet">X</button>
        <label>Pet Name</label>
        <input class="petName" placeholder="e.g. Bruno" required>
        <label>Pet Type</label>
        <select class="petType" required>
          <option>Dog</option><option>Cat</option><option>Rabbit</option>
          <option>Bird</option><option>Other</option>
        </select>
        <label>Birthdate</label>
        <input type="date" class="petBday" onchange="calcAge(this)" required>
        <label>Age</label>
        <input class="petAge" placeholder="Auto" readonly>
        <label>Weight (kg)</label>
        <input type="number" class="petWeight" placeholder="e.g. 12.5" step="0.1">
        <label>Medical Notes</label>
        <textarea class="petMedical" placeholder="Allergies, meds, etc."></textarea>
      </div>`;
    $('petsContainer').insertAdjacentHTML('beforeend', petHTML);
  }
  
  $('petsContainer').addEventListener('click', e => {
    if(e.target.classList.contains('remove-pet')){
      if(document.querySelectorAll('.pet-card').length > 1){
        e.target.closest('.pet-card').remove();
      } else {
        alert('Need at least 1 pet');
      }
    }
  });

  // 8. MAP + FARE LISTENERS
  $('serviceMode').onchange = computeFare;
  $('waitTime').onchange = computeFare;
  $('returnTrip').onchange = computeFare;
  
  $('clearLocationBtn').onclick = () => {
    if (marker) map.removeLayer(marker);
    marker = null;
    $('lat').value = ''; $('lng').value = '';
  };

  // 9. BOOKING SUBMIT
  $('bookBtn').onclick = async () => {
    const user = auth.currentUser;
    if(!user) return alert('Login first');
    if(!$('lat').value) return alert('Click the map to set location');
    if(!$('paymentMethod').value) return alert('Select payment method');

    const pets = [...document.querySelectorAll('.pet-card')].map(card => ({
      name: card.querySelector('.petName').value,
      type: card.querySelector('.petType').value,
      birthdate: card.querySelector('.petBday').value,
      age: card.querySelector('.petAge').value,
      weight: card.querySelector('.petWeight').value,
      medical: card.querySelector('.petMedical').value,
    }));

    if(pets.some(p => !p.name || !p.birthdate)) return alert('Complete all pet details');

    try {
      await addDoc(collection(db, 'bookings'), {
        userId: user.uid, email: user.email,
        pets: pets,
        clinic: $('clinic').value,
        serviceType: $('serviceType').value,
        returnTrip: $('returnTrip').checked,
        serviceMode: $('serviceMode').value, // premium or budget
        waitHours: parseInt($('waitTime').value),
        notes: $('notes').value,
        location: { lat: parseFloat($('lat').value), lng: parseFloat($('lng').value) },
        paymentMethod: $('paymentMethod').value,
        estimatedFare: parseFloat($('fare').value) || 0,
        status: 'pending', // pending > accepted > in_progress > waiting_pickup > completed
        riderNotified: false, // Para sa "Pet is ready" alert sa driver
        createdAt: serverTimestamp()
      });
      alert('Booking sent! Rider will be notified when pet is ready for pickup.');
      $('bookingForm').reset();
      $('petsContainer').innerHTML = '';
      if (marker) map.removeLayer(marker); marker = null;
      $('addPetBtn').click();
      computeFare();
    } catch(e) { alert(e.message); }
  };

  // 10. INIT 1 PET ON LOAD
  window.onload = () => $('addPetBtn').click();
</script>
</body>
</html>
